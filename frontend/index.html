<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons / app icons — Wyncrest WC crown monogram -->
    <link rel="icon" type="image/png" href="/favicon.png" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="theme-color" content="#F6F8FB" />

    <!-- Set the theme BEFORE first paint to avoid a flash of the wrong theme.
         Mirrors the resolver in src/context/theme.ts (kept tiny + dependency-free
         so it can run inline). The React ThemeProvider then takes over. -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem('nexus.theme');
          // Explicit stored light/dark wins; "system" tracks the OS; anything
          // else (unset) defaults to light — must match getStoredChoice().
          var resolved =
            c === 'light' || c === 'dark'
              ? c
              : c === 'system' &&
                  window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', resolved === 'light' ? '#F6F8FB' : '#071011');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <!-- Apply the dark PALETTE + the ACCENT vars BEFORE first paint to avoid a
         flash. The dark palette is a data attribute (gated CSS in index.css);
         the accent applies its light/dark ramp inline. Mirrors src/config/
         {darkThemes,accents}.ts - keep the 9 ordered hexes in sync. -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var resolved = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';

          // Dark palette attribute (default = midnight-slate; keep in sync with
          // src/config/darkThemes.ts DEFAULT_DARK_THEME_KEY).
          var dt = localStorage.getItem('nexus.darkTheme') || 'midnight-slate';
          root.setAttribute('data-dark-theme', dt);

          // Accent ramp: 9 ordered vars [brand-50,500,600,700,900, action-400,500,600,700].
          var ORDER = ['--color-brand-50','--color-brand-500','--color-brand-600','--color-brand-700','--color-brand-900','--color-action-400','--color-action-500','--color-action-600','--color-action-700'];
          var T = {
            'wyncrest-blue': { l:['#ECF1FC','#2E63CD','#1D4ED8','#1A41A8','#122A5E','#3B7BE6','#2563EB','#1D4ED8','#1A41A8'], d:['#0E1C33','#5E92EC','#2F66D6','#90B7F5','#D8E5FC','#4D86E8','#3570DC','#2A5ECF','#234EB0'] },
            'electric-blue': { l:['#EBF2FE','#2F6FEF','#2563EB','#1D4FC4','#163172','#4485F2','#2F6FEF','#2056D6','#1D4FC4'], d:['#0D1C38','#62A0FF','#2A63E0','#93C5FD','#DBEAFE','#5C97FF','#3B82F6','#2F6FEF','#2056D6'] },
            'ice-cyan': { l:['#E7F6FB','#1186A6','#0E7490','#0C6079','#073B4A','#1E9DBE','#1186A6','#0E7490','#0C6079'], d:['#082530','#34D8EC','#0E7C97','#5DE0F2','#C5F4FB','#2BB6D4','#1198BA','#0E7E9C','#0C6378'] },
            'harbor-teal': { l:['#E6F2F1','#0D8278','#0A7068','#096058','#063E3A','#1C988F','#0D8278','#0A7068','#085048'], d:['#0E2A28','#2DD4BF','#0D8175','#5EEAD4','#A7F3E9','#19B3A4','#119A8D','#0E8175','#0B655C'] },
            'signal-indigo': { l:['#EEEDFB','#5249CF','#4338CA','#372EA6','#211C63','#6B63D6','#5249CF','#4338CA','#372EA6'], d:['#15123A','#8B85F0','#4F46E5','#A5A0F8','#DEDBFD','#6D64EC','#5B52DE','#4C43CE','#3F37AC'] },
            'estate-red': { l:['#FBEAE8','#C13325','#B42318','#971C13','#5C110B','#D14C3E','#C13325','#B42318','#971C13'], d:['#33100C','#F08070','#C9382B','#F4A79C','#FBDCD7','#DC5849','#CB4133','#B92F22','#97251A'] },
            'slate-blue': { l:['#ECEFF7','#46609F','#3B5BA5','#324C87','#1F2F50','#5A73B0','#46609F','#39538F','#324C87'], d:['#131B30','#7C9BD8','#4163AE','#9DB5E2','#DBE3F4','#5778C0','#4663A8','#3B5494','#314676'] },
          };
          var accent = localStorage.getItem('nexus.accent') || 'wyncrest-blue';
          var set = (T[accent] || T['wyncrest-blue'])[resolved === 'dark' ? 'd' : 'l'];
          for (var i = 0; i < ORDER.length; i++) root.style.setProperty(ORDER[i], set[i]);
          root.style.setProperty('--color-on-brand', '#FFFFFF');
          root.style.setProperty('--color-on-action', '#FFFFFF');
        } catch (e) { /* no-op */ }
      })();
    </script>
    <meta
      name="description"
      content="%BRAND_NAME% | %BRAND_TAGLINE% A secure property platform for tenants, landlords, and administrators."
    />
    <meta property="og:title" content="%BRAND_NAME% | %BRAND_DESCRIPTOR%" />
    <meta property="og:description" content="%BRAND_TAGLINE%" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/android-chrome-512x512.png" />
    <title>%BRAND_NAME% | %BRAND_DESCRIPTOR%</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Manrope = auth form UI face; Cormorant Garamond = auth hero display face.
         Only the weights actually used are requested (perf + no layout shift). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesque:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
