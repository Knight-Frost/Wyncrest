name: Documentation issue
description: Something in the docs is missing, unclear, or wrong
title: "[Docs] "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Wyncrest's documentation is meant to work for technical and non-technical readers alike. If something did not make sense, that is worth fixing.

  - type: input
    id: doc-file
    attributes:
      label: Doc file or section
      description: Which file or heading is this about? For example, README.md, or docs/AUTHORIZATION.md.
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is confusing or missing
      description: Describe the problem with the current text.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: If you have an idea of what it should say instead, share it here.
    validations:
      required: false

  - type: dropdown
    id: reader-type
    attributes:
      label: Reader type
      description: Who were you reading as when you hit this problem?
      options:
        - Developer
        - Reviewer
        - Non-technical reader
        - Maintainer
    validations:
      required: true
