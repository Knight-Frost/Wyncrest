name: Bug report
description: Something in Wyncrest is not working as expected
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. The more detail you give, the faster it can be fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the problem in plain language.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that lead to the problem.
      placeholder: |
        1. Go to...
        2. Click on...
        3. See the problem
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: Role affected
      description: Which account type were you using when this happened?
      options:
        - Tenant
        - Landlord
        - Admin
        - Super admin
        - Public visitor
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Page or feature affected
      description: The screen, page, or feature where the problem occurred.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser or environment
      description: Browser and OS, or local setup details if this is a development issue.
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots if you have them. Drag and drop images directly into this box.
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Blocking
    validations:
      required: true
